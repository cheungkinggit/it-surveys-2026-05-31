<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>資訊科技組問卷</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="home">
    <main class="landing">
      <section class="hero">
        <div>
          <p class="eyebrow">資訊科技組</p>
          <h1>問卷收集平台</h1>
          <p class="lead">請選擇需要填寫的問卷。系統會在同一瀏覽器記錄完成狀態，並在「問卷結果」頁集中查看統計及匯出 CSV。</p>
        </div>
        <div class="hero-panel">
          <span class="stat-number">2</span>
          <span class="stat-label">份問卷已準備</span>
        </div>
      </section>

      <section class="portal-grid" aria-label="問卷入口">
        <a class="portal-card student-card" href="student.html">
          <span class="card-kicker">問卷 1</span>
          <h2>學生問卷</h2>
          <p>按班別輸入實際上課人數，再記錄每題表示認同的學生人數。</p>
          <span class="card-action">進入學生問卷</span>
        </a>
        <a class="portal-card teacher-card" href="teacher.html">
          <span class="card-kicker">問卷 2</span>
          <h2>教師問卷</h2>
          <p>選擇老師姓名後，完成五題選擇題，首頁會顯示仍未完成的老師名單。</p>
          <span class="card-action">進入教師問卷</span>
        </a>
        <a class="portal-card result-card" href="results.html">
          <span class="card-kicker">統計</span>
          <h2>問卷結果</h2>
          <p>查看學生及教師問卷完成情況、各題統計，以及匯出 CSV 作後續整理。</p>
          <span class="card-action">查看問卷結果</span>
        </a>
      </section>
    </main>
  </body>
</html>
